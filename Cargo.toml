[package]
name = "pali-coin"
version = "0.1.0"
edition = "2021"

[dependencies]
sha2 = "0.10"
ed25519-dalek = "2.0"
rand = "0.8"
bellman = { version = "0.14", features = ["groth16"] }
bls12_381 = { version = "0.8" }
ff = "0.13"
group = "0.13"
pairing = "0.23"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
rocksdb = "0.21"
clap = { version = "4.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
log = "0.4"
env_logger = "0.10"
secp256k1 = "0.27.0"

[[bin]]
name = "pali-node"
path = "src/main.rs"

[[bin]]
name = "pali-miner"
path = "src/miner.rs"

[[bin]]
name = "pali-wallet"
path = "src/wallet.rs"
